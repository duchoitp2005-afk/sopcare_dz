<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopcare - Pro AI Studio v37</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .camera-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Giao diện Overlay chuyên nghiệp */
        .ui-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 15px; border-top: 1px solid #333; }
        
        /* 1. Hệ thống 37 bộ lọc (Thumbnail Strip) */
        .filter-strip { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 15px; padding-bottom: 5px; scrollbar-width: none; }
        .filter-item { min-width: 50px; text-align: center; cursor: pointer; }
        .thumb { width: 45px; height: 45px; background: #222; border-radius: 8px; border: 2px solid transparent; }
        .active .thumb { border-color: #00ffcc; }
        .filter-label { font-size: 8px; color: #aaa; margin-top: 4px; }

        /* 2. Thanh trượt chuyên sâu (Slider Group) */
        .slider-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .row { display: flex; align-items: center; gap: 10px; }
        .label { font-size: 9px; color: #00ffcc; width: 70px; text-transform: uppercase; }
        input[type=range] { flex: 1; accent-color: #00ffcc; height: 3px; }

        /* 3. Nút chức năng AI và Chụp */
        .action-row { display: flex; justify-content: space-between; align-items: center; }
        .ai-btn { background: #111; border: 1px solid #00ffcc; color: #00ffcc; padding: 8px 15px; border-radius: 20px; font-size: 10px; cursor: pointer; }
        .shutter { width: 60px; height: 60px; border-radius: 50%; border: 4px solid #fff; }
    </style>
</head>
<body>
    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        
        <div class="ui-overlay">
            <div class="filter-strip" id="filterBar"></div>
            
            <div class="slider-group">
                <div class="row"><span class="label">Tương phản</span><input type="range" id="con" min="50" max="150" value="100" oninput="apply()"></div>
                <div class="row"><span class="label">Bão hòa</span><input type="range" id="sat" min="50" max="150" value="100" oninput="apply()"></div>
                <div class="row"><span class="label">Độ sáng</span><input type="range" id="bri" min="50" max="150" value="100" oninput="apply()"></div>
            </div>

            <div class="action-row">
                <button class="ai-btn" onclick="triggerAI()">✨ AI AUTO-MIX</button>
                <div class="shutter" onclick="takePhoto()"></div>
                <button class="ai-btn" onclick="resetAll()">RESET</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const filterBar = document.getElementById('filterBar');

        // Khởi tạo 37 bộ lọc
        for (let i = 1; i <= 37; i++) {
            let item = document.createElement('div');
            item.className = 'filter-item';
            item.innerHTML = `<div class="thumb"></div><div class="filter-label">KP${i}</div>`;
            item.onclick = () => { document.querySelectorAll('.filter-item').forEach(e => e.classList.remove('active')); item.classList.add('active'); apply(); };
            filterBar.appendChild(item);
        }

        function apply() {
            const c = document.getElementById('con').value;
            const s = document.getElementById('sat').value;
            const b = document.getElementById('bri').value;
            video.style.filter = `contrast(${c}%) saturate(${s}%) brightness(${b}%)`;
        }

        function triggerAI() { /* Logic AI cũ */ alert("Đang phân tích sắc độ AI..."); }
        function resetAll() { /* Logic cũ */ }
        function takePhoto() { /* Logic chụp ảnh cũ */ }

        navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s);
    </script>
</body>
</html>
