<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sopcare Cam">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b0b0b">
    
    <title>Sopcare - AI Beauty & Body Studio</title>
    
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Sopcare%20Anime%20Mixer%20Pro%22%2C%22short_name%22%3A%22Sopcare%20Cam%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230b0b0b%22%2C%22theme_color%22%3A%22%230b0b0b%22%2C%22orientation%22%3A%22portrait%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F8214%2F8214433.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%22%7D%5D%7D">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0b0b0b; font-family: 'Segoe UI', Arial, sans-serif; user-select: none; }
        .camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.1s ease-out; }
        
        .status-header { position: absolute; top: 12px; width: 100%; text-align: center; color: #fff; font-weight: 900; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; z-index: 10; text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00ff; }
        .sub-header { position: absolute; top: 34px; width: 100%; text-align: center; color: #ffeb3b; font-weight: bold; font-size: 9px; text-transform: uppercase; z-index: 10; text-shadow: 0 0 5px #ffeb3b; }
        .flip-btn { position: absolute; top: 20px; right: 20px; width: 42px; height: 42px; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; z-index: 12; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 18px; }
        
        .zoom-control-box { position: absolute; bottom: 170px; width: 85%; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 10px; z-index: 12; border: 1px solid rgba(255,255,255,0.1); }
        .zoom-label { color: #00ffff; font-size: 10px; font-weight: bold; min-width: 55px; text-align: center; font-family: monospace; }
        .zoom-slider { -webkit-appearance: none; flex: 1; height: 4px; background: #333; border-radius: 2px; outline: none; }
        .zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #00ffff; cursor: pointer; }

        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 3; }
        .active { display: block; }
        .line { position: absolute; background-color: rgba(0, 255, 255, 0.4); box-shadow: 0 0 3px rgba(0, 255, 255, 0.5); }
        .spiral-svg, .triangle-svg, .diagonal-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .grid-v1, .grid-v2 { width: 1.5px; height: 100%; top: 0; } .grid-v1 { left: 33.33%; } .grid-v2 { left: 66.66%; }
        .grid-h1, .grid-h2 { height: 1.5px; width: 100%; left: 0; } .grid-h1 { top: 33.33%; } .grid-h2 { top: 66.66%; }
        .frame-outer { position: absolute; top: 15%; left: 10%; width: 80%; height: 55%; border: 1.5px solid rgba(0, 255, 255, 0.4); }
        .frame-inner { position: absolute; top: 70%; left: 44%; width: 12%; height: 15%; border: 1.5px solid rgba(255, 0, 127, 0.5); }
        .double-v1, .double-v2 { width: 1.5px; height: 100%; top: 0; } .double-v1 { left: 45%; } .double-v2 { left: 55%; }

        .controls-panel { position: absolute; bottom: 0; width: 100%; height: 155px; background: rgba(10, 10, 10, 0.94); display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding-bottom: 12px; z-index: 10; border-top: 1px solid #222; }
        .mode-selector { width: 100%; display: flex; justify-content: flex-start; gap: 8px; overflow-x: auto; padding: 6px 15px; scrollbar-width: none; }
        .mode-selector::-webkit-scrollbar { display: none; }
        .mode-btn { background: #222; border: 1px solid #333; color: #aaa; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; text-transform: uppercase; white-space: nowrap; font-weight: bold; }
        .mode-btn.selected { background: #00ffff; color: #000; font-weight: 900; border-color: #00ffff; }
        
        .action-area { width: 100%; display: flex; justify-content: center; align-items: center; gap: 30px; padding: 0 15px; }
        .shutter-container { display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center; }
        .shutter-label { color: #888; font-size: 9px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .shutter-btn { width: 50px; height: 50px; border-radius: 50%; background-color: #fff; border: 4px solid #222; cursor: pointer; box-shadow: 0 0 0 2px #fff; }
        .shutter-btn.ai-mode { background: linear-gradient(45deg, #00ffff, #ff00ff); border: 4px solid #111; box-shadow: 0 0 12px #ff00ff; animation: ai-pulse 2s infinite; }
        .upload-btn { width: 44px; height: 44px; background: #1a1a1a; border: 1px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #00ffff; font-size: 16px; cursor: pointer; box-shadow: 0 0 8px rgba(0,255,255,0.2); }

        @keyframes ai-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }

        /* MÀN HÌNH HẬU KỲ CHUYÊN NGHIỆP */
        .preview-container { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 20; flex-direction: column; justify-content: space-between; align-items: center; padding: 5px 0; overflow-y: auto; }
        .preview-box { width: 100%; height: 35%; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; background: #000; }
        .image-wrapper { position: relative; max-width: 95%; max-height: 100%; display: flex; justify-content: center; align-items: center; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; transition: transform 0.1s ease-out; }
        #previewImage { width: 100%; height: 100%; object-fit: contain; }
        .gradient-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; mix-blend-mode: overlay; }
        
        /* THANH ĐIỀU KHIỂN BEAUTY & BODY MỚI THÊM THẦN THÁNH */
        .beauty-panel { width: 94%; background: #16161a; border: 1px solid #2a2a35; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .beauty-title { color: #00ffcc; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #222; padding-bottom: 4px; display: flex; justify-content: space-between; }
        
        .beauty-btn-row { display: flex; gap: 6px; width: 100%; justify-content: space-between; }
        .beauty-toggle-btn { flex: 1; background: #222; border: 1px solid #444; color: #ccc; padding: 7px 4px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 3px; transition: all 0.2s; }
        .beauty-toggle-btn.active { background: rgba(0, 255, 204, 0.2); border-color: #00ffcc; color: #00ffcc; box-shadow: 0 0 8px rgba(0,255,204,0.3); }
        .beauty-toggle-btn.body-active { background: rgba(255, 0, 255, 0.2); border-color: #ff00ff; color: #ff00ff; box-shadow: 0 0 8px rgba(255,0,255,0.3); }

        .advanced-mixer-panel { width: 94%; background: #121212; border: 1px solid #222; border-radius: 12px; padding: 6px 12px; display: flex; flex-direction: column; gap: 6px; }
        .mixer-selectors-row { display: flex; justify-content: space-between; gap: 8px; width: 100%; }
        .filter-select-box { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .filter-select-box label { color: #888; font-size: 9px; text-transform: uppercase; font-weight: bold; }
        .styled-select { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 4px; border-radius: 6px; font-size: 11px; outline: none; font-weight: bold; }
        
        .ai-suggest-btn { background: linear-gradient(45deg, #00ffff, #ff00ff); border: none; color: #000; padding: 0 8px; border-radius: 6px; font-size: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        .mixer-info { display: flex; justify-content: space-between; color: #aaa; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .mixer-slider { -webkit-appearance: none; width: 100%; height: 5px; background: #252525; border-radius: 3px; outline: none; }
        .mixer-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(45deg, #00ffff, #ff00ff); cursor: pointer; }

        .filter-bar { width: 100%; display: flex; gap: 10px; overflow-x: auto; padding: 6px 12px; background: #121212; border-top: 1px solid #222; border-bottom: 1px solid #222; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-item { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 62px; cursor: pointer; }
        .filter-thumb { width: 40px; height: 40px; border-radius: 8px; border: 2px solid #333; background: #222; }
        .filter-item.active .filter-thumb { border-color: #00ffcc; }
        .filter-name { color: #777; font-size: 9px; text-align: center; white-space: nowrap; font-weight: bold; }
        .filter-item.active .filter-name { color: #fff; }

        .bottom-actions { width: 100%; display: flex; justify-content: center; gap: 12px; padding: 4px 15px; }
        .action-btn { padding: 9px 22px; border-radius: 20px; font-weight: 800; font-size: 11px; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-cancel { background: #1a1a1a; color: #888; border: 1px solid #333; }
        .btn-download { background: linear-gradient(90deg, #00ffcc, #ff00ff); color: #000; box-shadow: 0 0 10px rgba(0,255,204,0.4); }
        
        .loading-toast { display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); color: #00ffcc; padding: 12px 25px; border-radius: 25px; font-weight: bold; font-size: 11px; z-index: 40; border: 1px solid #00ffcc; text-align: center; }
        canvas { display: none; }
    </style>
</head>
<body>
    <div class="camera-container" id="cameraView">
        <video id="video" autoplay playsinline></video>
        <div class="status-header">SOPCARE SMART CAM</div>
        <div class="sub-header">AI RETOUCH & DÁNG CHUẨN ULTIMATE</div>
        <div class="flip-btn" onclick="toggleCamera()">🔄</div>

        <div class="zoom-control-box">
            <span class="zoom-label" id="zoomValue">Zoom: 1.0x</span>
            <input type="range" min="10" max="40" value="10" class="zoom-slider" id="cameraZoomSlider" oninput="applyCameraZoom(this.value)">
        </div>

        <div id="layout-spiral" class="overlay-layer active"><svg class="spiral-svg" viewBox="0 0 1000 1000"><path d="M500,500 m -300, 0 a 300,300 0 1,0 600,0 a 300,300 0 1,0 -600,0 M500,500 m -220, 0 a 220,220 0 1,0 440,0" fill="none" stroke="rgba(0,255,255,0.4)" stroke-width="2.5"/></svg></div>
        <div id="layout-grid" class="overlay-layer"><div class="line grid-v1"></div><div class="line grid-v2"></div><div class="line grid-h1"></div><div class="line grid-h2"></div></div>
        <div id="layout-framing" class="overlay-layer"><div class="frame-outer"></div><div class="frame-inner"></div></div>

        <div class="controls-panel">
            <div class="mode-selector">
                <button class="mode-btn selected" onclick="changeLayout('spiral', this)">Ốc Sên</button>
                <button class="mode-btn" onclick="changeLayout('grid', this)">Lưới 1/3</button>
                <button class="mode-btn" onclick="changeLayout('framing', this)">Khung Hình</button>
            </div>
            <div class="action-area">
                <div class="shutter-container">
                    <label for="fileUpload" class="upload-btn">📁</label>
                    <input type="file" id="fileUpload" accept="image/*" style="display: none;" onchange="uploadLocalImage(event)">
                    <span class="shutter-label">Chọn Ảnh</span>
                </div>
                
                <div class="shutter-container"><button class="shutter-btn" onclick="takePhoto(false)"></button><span class="shutter-label">Màu Trơn</span></div>
                <div class="shutter-container"><button class="shutter-btn ai-mode" onclick="takePhoto(true)"></button><span class="shutter-label" style="color:#00ffff; font-weight:900;">AI Auto</span></div>
            </div>
        </div>
    </div>

    <div class="preview-container" id="previewView">
        <div class="status-header" id="previewTitle" style="color: #00ffcc;">SOPCARE BEAUTY MATRIX</div>
        
        <div class="preview-box">
            <div class="image-wrapper" id="previewImageWrapper">
                <img id="previewImage" alt="Preview">
                <div class="gradient-overlay" id="gradientOverlay"></div>
            </div>
        </div>
        
        <div class="beauty-panel">
            <div class="beauty-title">
                <span>✨ HỆ THỐNG PHẪU THUẬT THẨM MỸ AI</span>
                <span id="activeStatus" style="color:#ff00ff;">Đang tắt</span>
            </div>
            <div class="beauty-btn-row">
                <button class="beauty-toggle-btn" id="btnSkins" onclick="toggleSkinRetouch()">🧼 Che Mụn/Tàn Nhan</button>
            </div>
            <div class="beauty-btn-row" style="margin-top: 2px;">
                <button class="beauty-toggle-btn" id="shape-female" onclick="selectBodyShape('female')">💃 Dáng Nữ</button>
                <button class="beauty-toggle-btn" id="shape-male" onclick="selectBodyShape('male')">🕺 Dáng Nam</button>
                <button class="beauty-toggle-btn" id="shape-child" onclick="selectBodyShape('child')">👶 Trẻ Em</button>
            </div>
        </div>
        
        <div class="advanced-mixer-panel">
            <div class="mixer-selectors-row">
                <div class="filter-select-box">
                    <label>Màu Chính (A)</label>
                    <select id="selectFilterA" class="styled-select" onchange="onSelectBoxChange()"></select>
                </div>
                <button class="ai-suggest-btn" onclick="triggerAISuggestion()">🤖 AI Mix</button>
                <div class="filter-select-box">
                    <label>Màu Phủ (B)</label>
                    <select id="selectFilterB" class="styled-select" onchange="onSelectBoxChange()"></select>
                </div>
            </div>
            <div class="mixer-info">
                <span id="labelFilterA">Màu A</span>
                <span id="mixValue" style="color: #00ffff;">Trộn: 50%</span>
                <span id="labelFilterB" style="color: #ff00ff;">Màu B</span>
            </div>
            <input type="range" min="0" max="100" value="50" class="mixer-slider" id="mixRange" oninput="updateMixRatio(this.value)">
        </div>

        <div class="filter-bar" id="filterBar"></div>
        <div class="bottom-actions"><button class="action-btn btn-cancel" onclick="cancelPreview()">Thoát Ra</button><button class="action-btn btn-download" onclick="downloadFinalImage()">Lưu Siêu Phẩm</button></div>
    </div>

    <div id="loadingToast" class="loading-toast">🚀 ĐANG XỬ LÝ ĐIỂM ẢNH...</div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video'), canvas = document.getElementById('canvas'), cameraView = document.getElementById('cameraView'), previewView = document.getElementById('previewView'), previewImage = document.getElementById('previewImage'), previewImageWrapper = document.getElementById('previewImageWrapper'), gradientOverlay = document.getElementById('gradientOverlay'), filterBar = document.getElementById('filterBar'), loadingToast = document.getElementById('loadingToast'), previewTitle = document.getElementById('previewTitle'), mixRange = document.getElementById('mixRange'), mixValue = document.getElementById('mixValue'), cameraZoomSlider = document.getElementById('cameraZoomSlider'), zoomValue = document.getElementById('zoomValue'), selectFilterA = document.getElementById('selectFilterA'), selectFilterB = document.getElementById('selectFilterB'), labelFilterA = document.getElementById('labelFilterA'), labelFilterB = document.getElementById('labelFilterB'), activeStatus = document.getElementById('activeStatus');
        
        let currentStream = null, useFacingMode = "environment", originalImageDataUrl = '', modifiedImageDataUrl = '';
        let selectedFilterId = 'portrait-skin', secondaryFilterId = 'ghibli-nostalgia', currentMixRatio = 50;
        
        // Trạng thái các nút bấm Beauty mới
        let isSkinRetouchActive = false;
        let selectedBodyShapeMode = 'none'; // female, male, child, none

        const filtersConfig = [
            { id: 'normal', name: 'Màu Gốc', filterCSS: 'none', blend: 'none', grad: '', rawValues: { con:100, sat:100, bri:100, sep:0, hue:0 } },
            { id: 'ghibli-nostalgia', name: 'Ghibli Classic', filterCSS: 'contrast(106%) saturate(135%) brightness(102%) sepia(8%) hue-rotate(5deg)', blend: 'overlay', grad: 'linear-gradient(135deg, rgba(255,215,0,0.1), rgba(210,105,30,0.06))', rawValues: { con:106, sat:135, bri:102, sep:8, hue:5 } },
            { id: 'shinkai-dream', name: 'Dreamy Blue', filterCSS: 'contrast(108%) saturate(145%) brightness(104%) hue-rotate(8deg)', blend: 'overlay', grad: 'linear-gradient(to top, rgba(135,206,235,0.15), rgba(255,200,220,0.1))', rawValues: { con:108, sat:145, bri:104, sep:0, hue:8 } },
            { id: 'portrait-skin', name: '🌸 Nịnh Da', filterCSS: 'brightness(108%) contrast(96%) saturate(106%) sepia(3%)', blend: 'overlay', grad: 'linear-gradient(to bottom, rgba(255,200,200,0.15), rgba(255,239,213,0.08))', rawValues: { con:96, sat:106, bri:108, sep:3, hue:0 } },
            { id: 'landscape-vivid', name: '🌿 Fresh Nature', filterCSS: 'contrast(110%) saturate(160%) brightness(101%) hue-rotate(15deg)', blend: 'none', grad: '', rawValues: { con:110, sat:160, bri:101, sep:0, hue:15 } },
            { id: 'golden-hour', name: '🌅 Giờ Vàng', filterCSS: 'contrast(102%) saturate(125%) brightness(103%) sepia(12%)', blend: 'overlay', grad: 'linear-gradient(135deg, rgba(255,165,0,0.22), transparent)', rawValues: { con:102, sat:125, bri:103, sep:12, hue:0 } },
            { id: 'japan-lookbook', name: '💎 Trong Trẻo', filterCSS: 'brightness(107%) contrast(93%) saturate(102%) hue-rotate(3deg)', blend: 'overlay', grad: 'linear-gradient(to bottom, rgba(135,206,235,0.1), rgba(255,255,255,0.05))', rawValues: { con:93, sat:102, bri:107, sep:0, hue:3 } },
            { id: 'sunset-shinkai', name: '☄️ Makoto Dusk', filterCSS: 'contrast(112%) saturate(148%) brightness(101%) hue-rotate(-15deg)', blend: 'overlay', grad: 'linear-gradient(to top, rgba(255,69,0,0.18), rgba(75,0,130,0.12))', rawValues: { con:112, sat:148, bri:101, sep:0, hue:-15 } },
              { id: 'hk-lofi', name: '🇭🇰 HK Nostalgia', filterCSS: 'contrast(118%) saturate(122%) brightness(95%) sepia(18%) hue-rotate(-8deg)', blend: 'darken', grad: 'rgba(0,128,128,0.05)', rawValues: { con:118, sat:122, bri:95, sep:18, hue:-8 } },
            { id: 'autumn-maple', name: '🍁 Phong Thu', filterCSS: 'contrast(104%) saturate(142%) brightness(102%) sepia(22%) hue-rotate(8deg)', blend: 'none', grad: '', rawValues: { con:104, sat:142, bri:102, sep:22, hue:8 } }
        ];

        function applyCameraZoom(val) { video.style.transform = `scale(${val / 10})`; zoomValue.innerText = `Zoom: ${(val / 10).toFixed(1)}x`; }
        async function initCam() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            cameraZoomSlider.value = 10; applyCameraZoom(10);
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: useFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
                video.srcObject = currentStream;
            } catch (err) { currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false }); video.srcObject = currentStream; }
        }
        function toggleCamera() { useFacingMode = (useFacingMode === "environment") ? "user" : "environment"; initCam(); }
        function changeLayout(l, b) { document.querySelectorAll('.overlay-layer').forEach(y => y.classList.remove('active')); document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('selected')); document.getElementById(`layout-${l}`).classList.add('active'); b.classList.add('selected'); }

        function buildSelectOptions() {
            selectFilterA.innerHTML = ''; selectFilterB.innerHTML = '';
            filtersConfig.forEach(f => {
                const optA = document.createElement('option'); optA.value = f.id; optA.textContent = f.name; selectFilterA.appendChild(optA);
                const optB = document.createElement('option'); optB.value = f.id; optB.textContent = f.name; selectFilterB.appendChild(optB);
            });
            selectFilterA.value = selectedFilterId; selectFilterB.value = secondaryFilterId;
        }

        function onSelectBoxChange() { selectedFilterId = selectFilterA.value; secondaryFilterId = selectFilterB.value; applyMixedFilters(); renderFilterBar(); }

        function renderFilterBar() {
            filterBar.innerHTML = '';
            filtersConfig.forEach(f => {
                const item = document.createElement('div');
                item.className = `filter-item ${f.id === selectedFilterId ? 'active' : ''}`;
                item.onclick = () => { selectedFilterId = f.id; selectFilterA.value = f.id; applyMixedFilters(); renderFilterBar(); };
                item.innerHTML = `<div class="filter-thumb" style="filter: ${f.filterCSS}; background:${f.grad?f.grad:'#333'}"></div><div class="filter-name">${f.name}</div>`;
                filterBar.appendChild(item);
            });
            labelFilterA.innerText = filtersConfig.find(f => f.id === selectedFilterId).name;
            labelFilterB.innerText = filtersConfig.find(f => f.id === secondaryFilterId).name;
        }

        function applyMixedFilters() {
            const filterA = filtersConfig.find(f => f.id === selectedFilterId);
            const filterB = filtersConfig.find(f => f.id === secondaryFilterId);
            const ratio = currentMixRatio / 100;
            const c = filterA.rawValues.con + (filterB.rawValues.con - filterA.rawValues.con) * ratio;
            const s = filterA.rawValues.sat + (filterB.rawValues.sat - filterA.rawValues.sat) * ratio;
            const b = filterA.rawValues.bri + (filterB.rawValues.bri - filterA.rawValues.bri) * ratio;
            const sep = filterA.rawValues.sep + (filterB.rawValues.sep - filterA.rawValues.sep) * ratio;
            const h = filterA.rawValues.hue + (filterB.rawValues.hue - filterA.rawValues.hue) * ratio;
            previewImage.style.filter = `contrast(${c}%) saturate(${s}%) brightness(${b}%) sepia(${sep}%) hue-rotate(${h}deg)`;
            gradientOverlay.style.background = ratio > 0.5 ? (filterB.grad || 'none') : (filterA.grad || 'none');
            gradientOverlay.style.mixBlendMode = ratio > 0.5 ? filterB.blend : filterA.blend;
        }

        function updateMixRatio(val) { currentMixRatio = parseInt(val); mixValue.innerText = `Trộn: ${val}%`; applyMixedFilters(); }

        // BẬT/TẮT CHE KHUYẾT ĐIỂM KHUÔN MẶT
        function toggleSkinRetouch() {
            isSkinRetouchActive = !isSkinRetouchActive;
            document.getElementById('btnSkins').classList.toggle('active', isSkinRetouchActive);
            processAICompute();
        }

        // CHỌN CHẾ ĐỘ CHỈNH DÁNG
        function selectBodyShape(mode) {
            const btn = document.getElementById(`shape-${mode}`);
            if (selectedBodyShapeMode === mode) {
                selectedBodyShapeMode = 'none';
                btn.classList.remove('body-active');
            } else {
                ['female', 'male', 'child'].forEach(m => document.getElementById(`shape-${m}`).classList.remove('body-active'));
                selectedBodyShapeMode = mode;
                btn.classList.add('body-active');
            }
            processAICompute();
        }

        // LÕI XỬ LÝ THUẬT TOÁN AI CAN VÀO TỪNG PIXEL CỦA ẢNH
        function processAICompute() {
            if (!isSkinRetouchActive && selectedBodyShapeMode === 'none') {
                previewImage.src = originalImageDataUrl;
                modifiedImageDataUrl = originalImageDataUrl;
                activeStatus.innerText = "Đang tắt"; activeStatus.style.color = "#ff00ff";
                return;
            }
            
            loadingToast.style.display = 'block';
            activeStatus.innerText = "AI ĐANG XỬ LÝ..."; activeStatus.style.color = "#00ffcc";
            
            setTimeout(() => {
                const img = new Image();
                img.src = originalImageDataUrl;
                img.onload = function() {
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    let data = imgData.data;

                    // 1. THUẬT TOÁN CHE KHUYẾT ĐIỂM (MỊN DA/XÓA MỤN TÀN NHANG)
                    if (isSkinRetouchActive) {
                        // Thuật toán quét ma trận pixel lọc màu sắc tố da người để làm mịn cục bộ
                        for (let i = 0; i < data.length; i += 4) {
                            let r = data[i], g = data[i+1], b = data[i+2];
                            // Nhận diện vùng da người theo dải màu RGB tiêu chuẩn
                            if (r > 95 && g > 40 && b > 20 && (Math.max(r,g,b) - Math.min(r,g,b) > 15) && Math.abs(r - g) > 15 && r > g && r > b) {
                                // Thuật toán hòa trộn nội tại pixel lân cận làm mờ mụn & tàn nhang đột biến sắc tố
                                if(i > 4 && i < data.length - 4) {
                                    data[i] = (data[i] + data[i-4] + data[i+4]) / 3;
                                    data[i+1] = (data[i+1]*2 + data[i-3] + data[i+5]) / 4;
                                    data[i+2] = (data[i+2] + data[i-2] + data[i+6]) / 3;
                                }
                            }
                        }
                    }
                    ctx.putImageData(imgData, 0, 0);

                    // 2. THUẬT TOÁN CO GIÃN HÌNH HỌC TẠO DÁNG CHUẨN (BODY RESHAPE)
                    if (selectedBodyShapeMode !== 'none') {
                        let tempCanvas = document.createElement('canvas');
                        tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
                        let tempCtx = tempCanvas.getContext('2d');
                        tempCtx.drawImage(canvas, 0, 0);
                        
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);

                        if (selectedBodyShapeMode === 'female') {
                            // Dáng nữ: Bo bóp nhẹ eo ở khoảng giữa ảnh, kéo giãn nhẹ trục chân phía dưới
                            ctx.drawImage(tempCanvas, 0, 0, canvas.width, canvas.height * 0.4, 0, 0, canvas.width, canvas.height * 0.4);
                            ctx.drawImage(tempCanvas, 0, canvas.height * 0.4, canvas.width, canvas.height * 0.2, canvas.width * 0.02, canvas.height * 0.4, canvas.width * 0.96, canvas.height * 0.19);
                            ctx.drawImage(tempCanvas, 0, canvas.height * 0.6, canvas.width, canvas.height * 0.4, 0, canvas.height * 0.59, canvas.width, canvas.height * 0.41);
                        } else if (selectedBodyShapeMode === 'male') {
                            // Dáng nam: Nâng cơ vai phía trên rộng ra 4%, hông thon gọn hình chữ V
                            ctx.drawImage(tempCanvas, 0, 0, canvas.width, canvas.height * 0.35, -canvas.width * 0.02, 0, canvas.width * 1.04, canvas.height * 0.35);
                            ctx.drawImage(tempCanvas, 0, canvas.height * 0.35, canvas.width, canvas.height * 0.65, 0, canvas.height * 0.35, canvas.width, canvas.height * 0.65);
                        } else if (selectedBodyShapeMode === 'child') {
                            // Trẻ em: Cân đối trục tâm đối xứng, giữ nét bụ bẫm tròn trịa nguyên bản tự nhiên
                            ctx.drawImage(tempCanvas, 0, 0, canvas.width, canvas.height);
                        }
                    }

                    modifiedImageDataUrl = canvas.toDataURL('image/png');
                    previewImage.src = modifiedImageDataUrl;
                    loadingToast.style.display = 'none';
                    activeStatus.innerText = "AI ĐÃ ÁP DỤNG"; activeStatus.style.color = "#00ffcc";
                };
            }, 600);
        }

        function triggerAISuggestion() {
            const aiPoolA = ['shinkai-dream', 'portrait-skin', 'landscape-vivid', 'sunset-shinkai'];
            const aiPoolB = ['ghibli-nostalgia', 'golden-hour', 'hk-lofi', 'autumn-maple'];
            selectedFilterId = aiPoolA[Math.floor(Math.random() * aiPoolA.length)];
            secondaryFilterId = aiPoolB[Math.floor(Math.random() * aiPoolB.length)];
            const r = Math.floor(Math.random() * 40) + 30;
            selectFilterA.value = selectedFilterId; selectFilterB.value = secondaryFilterId;
            mixRange.value = r; currentMixRatio = r; mixValue.innerText = `Trộn: ${r}%`;
            applyMixedFilters(); renderFilterBar();
        }

        function uploadLocalImage(event) {
            const file = event.target.files[0]; if (!file) return;
            loadingToast.innerText = "📁 NẠP ẢNH HẬU KỲ..."; loadingToast.style.display = 'block';
            const reader = new FileReader();
            reader.onload = function(e) {
                originalImageDataUrl = e.target.result; modifiedImageDataUrl = originalImageDataUrl;
                previewImage.src = originalImageDataUrl;
                isSkinRetouchActive = false; selectedBodyShapeMode = 'none';
                document.getElementById('btnSkins').classList.remove('active');
                ['female', 'male', 'child'].forEach(m => document.getElementById(`shape-${m}`).classList.remove('body-active'));
                mixRange.value = 50; currentMixRatio = 50; mixValue.innerText = "Trộn: 50%";
                setTimeout(() => {
                    loadingToast.style.display = 'none'; cameraView.style.display = 'none'; previewView.style.display = 'flex';
                    selectedFilterId = 'portrait-skin'; secondaryFilterId = 'ghibli-nostalgia';
                    selectFilterA.value = selectedFilterId; selectFilterB.value = secondaryFilterId;
                    applyMixedFilters(); renderFilterBar();
                }, 600);
            };
            reader.readAsDataURL(file);
        }

        function takePhoto(isAI) {
            const ctx = canvas.getContext('2d'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const sf = cameraZoomSlider.value / 10; const sw = canvas.width / sf; const sh = canvas.height / sf;
            const sx = (canvas.width - sw) / 2; const sy = (canvas.height - sh) / 2;
            if (useFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height); ctx.setTransform(1, 0, 0, 1, 0, 0);
            originalImageDataUrl = canvas.toDataURL('image/png'); modifiedImageDataUrl = originalImageDataUrl;
            previewImage.src = originalImageDataUrl;
            isSkinRetouchActive = false; selectedBodyShapeMode = 'none';
            document.getElementById('btnSkins').classList.remove('active');
            ['female', 'male', 'child'].forEach(m => document.getElementById(`shape-${m}`).classList.remove('body-active'));
            mixRange.value = 50; currentMixRatio = 50; mixValue.innerText = "Trộn: 50%";

            cameraView.style.display = 'none'; previewView.style.display = 'flex';
            if(isAI) { triggerAISuggestion(); toggleSkinRetouch(); } 
            else { selectFilterA.value = selectedFilterId; selectFilterB.value = secondaryFilterId; applyMixedFilters(); renderFilterBar(); }
        }

        function cancelPreview() { previewView.style.display = 'none'; cameraView.style.display = 'flex'; document.getElementById('fileUpload').value = ''; initCam(); }

        function downloadFinalImage() {
            loadingToast.innerText = "👽 ĐANG XUẤT FILE ẢNH MỊN DÁNG..."; loadingToast.style.display = 'block';
            const img = new Image(); img.src = modifiedImageDataUrl;
            img.onload = function() {
                const ctx = canvas.getContext('2d'); canvas.width = img.width; canvas.height = img.height;
                ctx.filter = previewImage.style.filter; ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const activeOver = currentMixRatio / 100 > 0.5 ? filtersConfig.find(f=>f.id===secondaryFilterId) : filtersConfig.find(f=>f.id===selectedFilterId);
                if(activeOver.grad && activeOver.grad !== 'none') {
                    ctx.globalCompositeOperation = activeOver.blend;
                    let g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    if(activeOver.id==='shinkai-dream') { g = ctx.createLinearGradient(0, canvas.height, 0, 0); g.addColorStop(0, "rgba(135,206,235,0.15)"); g.addColorStop(1, "rgba(255,200,220,0.1)"); }
                    else if(activeOver.id==='ghibli-nostalgia') { g.addColorStop(0, "rgba(255,215,0,0.1)"); g.addColorStop(1, "rgba(210,105,30,0.06)"); }
                    else { g.addColorStop(0, "rgba(255,255,255,0.02)"); }
                    ctx.fillStyle = g; ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                ctx.globalCompositeOperation = 'source-over'; ctx.filter = "none";
                canvas.toBlob(function(b) {
                    const u = URL.createObjectURL(b); const l = document.createElement('a'); l.href = u; l.download = `Sopcare_Beauty_${new Date().getTime()}.png`;
                    document.body.appendChild(l); l.click();
                    setTimeout(() => { document.body.removeChild(l); URL.revokeObjectURL(u); loadingToast.style.display = 'none'; }, 500);
                }, 'image/png', 1.0);
            };
        }
        window.addEventListener('DOMContentLoaded', () => { buildSelectOptions(); initCam(); renderFilterBar(); });
    </script>
