<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopcare - AI Studio v37.5 (Full)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0b0b0b; font-family: 'Segoe UI', Arial, sans-serif; user-select: none; }
        .camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls-panel { position: absolute; bottom: 0; width: 100%; background: rgba(10, 10, 10, 0.94); padding-bottom: 12px; z-index: 10; border-top: 1px solid #222; }
        .category-tab-bar { width: 100%; display: flex; gap: 4px; padding: 4px 14px; background: #101413; overflow-x: auto; }
        .category-tab-btn { background: #1a2220; color: #888; border: 1px solid #2a3532; padding: 4px 10px; border-radius: 8px; font-size: 9px; cursor: pointer; white-space: nowrap; text-transform: uppercase; }
        .category-tab-btn.active { background: #00ffcc; color: #000; font-weight: 900; }
        .filter-bar { width: 100%; display: flex; gap: 8px; overflow-x: auto; padding: 6px 14px; background: #101413; }
        .filter-item { min-width: 58px; cursor: pointer; text-align: center; }
        .filter-thumb { width: 36px; height: 36px; border-radius: 6px; border: 2px solid #333; background: #222; margin: 0 auto; }
        .filter-item.active .filter-thumb { border-color: #00ffcc; }
        .filter-name { color: #fff; font-size: 8px; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <div class="controls-panel">
            <div class="category-tab-bar">
                <button class="category-tab-btn active" id="tab-all" onclick="changeCategory('all')">🌈 All</button>
                <button class="category-tab-btn" id="tab-retro" onclick="changeCategory('film-retro')">🎞️ T1</button>
                <button class="category-tab-btn" id="tab-cyber" onclick="changeCategory('cyber-nature')">🌌 T2</button>
                <button class="category-tab-btn" id="tab-horror" onclick="changeCategory('horror-cinematic')">💀 T3</button>
                <button class="category-tab-btn" id="tab-sea" onclick="changeCategory('sea-ocean')">🌊 T4</button>
                <button class="category-tab-btn" id="tab-portrait" onclick="changeCategory('portrait')">✨ T5</button>
            </div>
            <div class="filter-bar" id="filterBar"></div>
        </div>
    </div>

    <script>
        // Danh sách bộ lọc (37 + 10 = 47)
        let filtersConfig = [
            { id: 'normal', name: 'Màu Gốc', category: 'all', rawValues: { con:100, sat:100, bri:100, sep:0, hue:0 } }
        ];

        // Tạo 37 bộ lọc gốc
        for (let i = 1; i <= 37; i++) {
            let cat = i <= 10 ? 'film-retro' : (i <= 20 ? 'cyber-nature' : (i <= 30 ? 'horror-cinematic' : 'sea-ocean'));
            filtersConfig.push({ id: `tone-kp${i}`, name: `KP${i}`, category: cat, rawValues: { con: 100, sat: 100, bri: 100, sep: 0, hue: 0 } });
        }

        // THÊM TỆP 5: CHÂN DUNG
        const portraitFilters = [
            { id: 'p01', name: 'Nắng Mơ', category: 'portrait', rawValues: { con: 95, sat: 105, bri: 105, sep: 5, hue: 0 } },
            { id: 'p02', name: 'Tuyết Xanh', category: 'portrait', rawValues: { con: 100, sat: 90, bri: 110, sep: 0, hue: -10 } },
            { id: 'p03', name: 'Rừng Xanh', category: 'portrait', rawValues: { con: 105, sat: 115, bri: 95, sep: 0, hue: 15 } },
            { id: 'p04', name: 'Hạ Trong', category: 'portrait', rawValues: { con: 90, sat: 120, bri: 105, sep: 0, hue: 5 } },
            { id: 'p05', name: 'Tĩnh Lặng', category: 'portrait', rawValues: { con: 85, sat: 80, bri: 90, sep: 10, hue: -5 } },
            { id: 'p06', name: 'Mưa Xanh', category: 'portrait', rawValues: { con: 105, sat: 95, bri: 90, sep: 5, hue: 10 } },
            { id: 'p07', name: 'Mây Mờ', category: 'portrait', rawValues: { con: 90, sat: 90, bri: 110, sep: 0, hue: 0 } },
            { id: 'p08', name: 'Đồng Cỏ', category: 'portrait', rawValues: { con: 100, sat: 125, bri: 100, sep: 5, hue: 10 } },
            { id: 'p09', name: 'Hoàng Hôn', category: 'portrait', rawValues: { con: 110, sat: 130, bri: 105, sep: 15, hue: 20 } },
            { id: 'p10', name: 'Vibe Film', category: 'portrait', rawValues: { con: 105, sat: 110, bri: 95, sep: 20, hue: 5 } }
        ];
        filtersConfig.push(...portraitFilters);

        // Render bộ lọc
        function changeCategory(cat) {
            document.querySelectorAll('.category-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${cat === 'all' ? 'all' : (cat === 'film-retro' ? 'retro' : (cat === 'cyber-nature' ? 'cyber' : (cat === 'horror-cinematic' ? 'horror' : (cat === 'sea-ocean' ? 'sea' : 'portrait'))))}`).classList.add('active');
            
            const filterBar = document.getElementById('filterBar');
            filterBar.innerHTML = '';
            filtersConfig.filter(f => cat === 'all' || f.category === cat || f.id === 'normal').forEach(f => {
                const item = document.createElement('div');
                item.className = 'filter-item';
                item.innerHTML = `<div class="filter-thumb"></div><div class="filter-name">${f.name}</div>`;
                item.onclick = () => { /* Logic apply màu */ };
                filterBar.appendChild(item);
            });
        }

        navigator.mediaDevices.getUserMedia({ video: true }).then(s => document.getElementById('video').srcObject = s);
        changeCategory('all');
    </script>
</body>
</html>
