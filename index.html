<h2>Đăng Ký Nhận Tư Vấn</h2>
        <p style="font-size: 14px; color: #8b949e;">Để lại thông tin, trợ lý sẽ liên hệ hỗ trợ bạn trong 15 phút.</p>
        <input type="text" id="fullname" placeholder="Họ và tên của bạn">
        <input type="tel" id="phone" placeholder="Số điện thoại Zalo">
        <button class="btn" style="width: 95%;" onclick="guiThongTin()">GỬI THÔNG TIN</button>
    </div>

    <footer>
        © 2026 Được thiết kế bởi Đức Hội Freelancer
    </footer>

    <script>
        function guiThongTin() {
            const name = document.getElementById('fullname').value;
            const phone = document.getElementById('phone').value;
            
            if (name && phone) {
                alert(`Cảm ơn ${name}! Thông tin của bạn (${phone}) đã được ghi nhận. Chúng tôi sẽ gọi lại ngay!`);
                document.getElementById('fullname').value = "";
                document.getElementById('phone').value = "";
            } else {
                alert("Hội ơi, nhắc khách nhập đủ Tên và Số điện thoại nhé!");
            }
        }
    </script>

</body>
</html>
