<head>

    <title>Sopcare - Pro Cam & Cinematic Blending Studio</title>
    
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Sopcare%20Pro%20Cam%22%2C%22short_name%22%3A%22Sopcare%20Cam%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230b0b0b%22%2C%22theme_color%22%3A%22%230b0b0b%22%2C%22orientation%22%3A%22portrait%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F8214%2F8214433.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%22%7D%5D%7D">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0b0b0b; font-family: 'Segoe UI', Arial, sans-serif; user-select: none; }
        .camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.1s ease-out; }
        
        .status-header { position: absolute; top: 12px; width: 100%; text-align: center; color: #fff; font-weight: 900; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; z-index: 10; text-shadow: 0 0 10px #00ffff; }
        .sub-header { position: absolute; top: 34px; width: 100%; text-align: center; color: #ffeb3b; font-weight: bold; font-size: 9px; text-transform: uppercase; z-index: 10; text-shadow: 0 0 5px #ffeb3b; }
        .flip-btn { position: absolute; top: 20px; right: 20px; width: 42px; height: 42px; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; z-index: 12; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 18px; }
        
        /* CỤM ĐIỀU KHIỂN PRO MODE TRONG SUỐT */
        .pro-settings-panel { display: none; position: absolute; top: 65px; left: 5%; width: 90%; background: rgba(15, 15, 20, 0.75); backdrop-filter: blur(8px); border: 1px solid rgba(0, 255, 255, 0.2); border-radius: 12px; padding: 10px; z-index: 15; flex-direction: column; gap: 8px; }
        .pro-settings-panel.active { display: flex; }
        .pro-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .pro-label { color: #00ffff; font-size: 9px; font-weight: 900; text-transform: uppercase; width: 65px; font-family: monospace; }
        .pro-slider { -webkit-appearance: none; flex: 1; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none; }
        .pro-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #00ffff; cursor: pointer; }
        .pro-val { color: #fff; font-size: 10px; font-weight: bold; width: 40px; text-align: right; font-family: monospace; }
        
        .wb-select { background: #222; color: #fff; border: 1px solid #444; font-size: 10px; padding: 2px 6px; border-radius: 4px; outline: none; font-weight: bold; }

        /* THANH ZOOM */
        .zoom-control-box { position: absolute; bottom: 170px; width: 85%; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 10px; z-index: 12; border: 1px solid rgba(255,255,255,0.1); }
        .zoom-label { color: #00ffff; font-size: 10px; font-weight: bold; min-width: 60px; text-align: center; font-family: monospace; }
        .zoom-slider { -webkit-appearance: none; flex: 1; height: 4px; background: #333; border-radius: 2px; outline: none; }
        .zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #00ffff; cursor: pointer; }

        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 3; }
        .active { display: block; }
        .line { position: absolute; background-color: rgba(0, 255, 255, 0.35); box-shadow: 0 0 2px rgba(0, 255, 255, 0.4); }
        .spiral-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .grid-v1, .grid-v2 { width: 1.5px; height: 100%; top: 0; } .grid-v1 { left: 33.33%; } .grid-v2 { left: 66.66%; }
        .grid-h1, .grid-h2 { height: 1.5px; width: 100%; left: 0; } .grid-h1 { top: 33.33%; } .grid-h2 { top: 66.66%; }

        .controls-panel { position: absolute; bottom: 0; width: 100%; height: 155px; background: rgba(10, 10, 10, 0.94); display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding-bottom: 12px; z-index: 10; border-top: 1px solid #222; }
        .mode-selector { width: 100%; display: flex; justify-content: flex-start; gap: 8px; overflow-x: auto; padding: 6px 15px; scrollbar-width: none; }
        .mode-selector::-webkit-scrollbar { display: none; }
        .mode-btn { background: #222; border: 1px solid #333; color: #aaa; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; text-transform: uppercase; white-space: nowrap; font-weight: bold; }
        .mode-btn.selected { background: #00ffff; color: #000; font-weight: 900; border-color: #00ffff; }
        .mode-btn.pro-active-tab { background: #ff00ff; color: #fff; border-color: #ff00ff; }

        .action-area { width: 100%; display: flex; justify-content: center; align-items: center; gap: 30px; padding: 0 15px; }
        .shutter-container { display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center; }
        .shutter-label { color: #888; font-size: 9px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .shutter-btn { width: 52px; height: 52px; border-radius: 50%; background-color: #fff; border: 4px solid #222; cursor: pointer; box-shadow: 0 0 0 2px #fff; }
        .shutter-btn.night-active { background: linear-gradient(45deg, #ff9800, #ff5722); border: 4px solid #111; box-shadow: 0 0 12px #ff5722; }
        .upload-btn { width: 44px; height: 44px; background: #1a1a1a; border: 1px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #00ffff; font-size: 16px; cursor: pointer; }

        /* MÀN HÌNH HẬU KỲ CHUYÊN NGHIỆP */
        .preview-container { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 20; flex-direction: column; justify-content: space-between; align-items: center; padding: 5px 0; overflow-y: auto; }
        .preview-box { width: 100%; height: 42%; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; background: #000; }

        #previewImage { width: 100%; height: 100%; object-fit: contain; transition: transform 0.1s ease-out; }
        .gradient-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; mix-blend-mode: overlay; }
        
        /* BOX TRỘN MÀU KÉP */
        .advanced-mixer-panel { width: 94%; background: #131318; border: 1px solid #22222a; border-radius: 14px; padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .mixer-selectors-row { display: flex; justify-content: space-between; gap: 8px; width: 100%; align-items: flex-end; }
        .filter-select-box { flex: 1; display: flex; flex-direction: column; gap: 3px; }
        .filter-select-box label { color: #888; font-size: 9px; text-transform: uppercase; font-weight: bold; }
        .styled-select { background: #1c1c24; color: #fff; border: 1px solid #333344; padding: 6px; border-radius: 8px; font-size: 11px; outline: none; font-weight: bold; }
        
        .night-enhance-btn { background: linear-gradient(45deg, #ff9800, #ff00ff); border: none; color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; height: 31px; }

        .mixer-info { display: flex; justify-content: space-between; color: #aaa; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .mixer-slider { -webkit-appearance: none; width: 100%; height: 5px; background: #252530; border-radius: 3px; outline: none; }
        .mixer-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(45deg, #00ffff, #ff00ff); cursor: pointer; }

        .filter-bar { width: 100%; display: flex; gap: 10px; overflow-x: auto; padding: 8px 14px; background: #101014; border-top: 1px solid #1a1a22; border-bottom: 1px solid #1a1a22; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-item { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 70px; cursor: pointer; }
        .filter-thumb { width: 46px; height: 46px; border-radius: 8px; border: 2px solid #333; background: #222; }
        .filter-item.active .filter-thumb { border-color: #00ffcc; box-shadow: 0 0 6px rgba(0,255,204,0.4); }
        .filter-name { color: #777; font-size: 9px; text-align: center; white-space: nowrap; font-weight: bold; }
        .filter-item.active .filter-name { color: #fff; }

        .bottom-actions { width: 100%; display: flex; justify-content: center; gap: 12px; padding: 6px 15px; background: #0a0a0d; }
        .action-btn { padding: 10px 24px; border-radius: 20px; font-weight: 800; font-size: 11px; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-cancel { background: #1a1a22; color: #888; border: 1px solid #2a2a35; }
        .btn-download { background: linear-gradient(90deg, #00ffcc, #ff00ff); color: #000; box-shadow: 0 0 10px rgba(0,255,204,0.4); }
        
        .loading-toast { display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); color: #00ffcc; padding: 12px 25px; border-radius: 25px; font-weight: bold; font-size: 11px; z-index: 40; border: 1px solid #00ffcc; text-align: center; }
        canvas { display: none; }
    </style>
</head>
<body>
    <div class="camera-container" id="cameraView">
        <video id="video" autoplay playsinline></video>
        <div class="status-header">SOPCARE STUDIO CAM</div>
        <div class="sub-header">BỘ SƯU TẬP TONE MÀU ĐA DẠNG CHUYÊN NGHIỆP</div>
        <div class="flip-btn" onclick="toggleCamera()">🔄</div>

        <div class="pro-settings-panel" id="proPanel">
            <div class="pro-row">
                <span class="pro-label">Bù Sáng EV</span>
                <input type="range" min="-20" max="20" value="-3" class="pro-slider" id="proEV" oninput="applyProControls()">
                <span class="pro-val" id="valEV">-0.3</span>
            </div>
            <div class="pro-row">
                <span class="pro-label">Tương Phản</span>
                <input type="range" min="50" max="150" value="115" class="pro-slider" id="proContrast" oninput="applyProControls()">
                <span class="pro-val" id="valContrast">115%</span>
            </div>
            <div class="pro-row">
                <span class="pro-label">Độ Bão Hòa</span>
                <input type="range" min="50" max="160" value="110" class="pro-slider" id="proSat" oninput="applyProControls()">
                <span class="pro-val" id="valSat">110%</span>
            </div>
            <div class="pro-row">
                <span class="pro-label">Cân Bằng WB</span>
                <select id="proWB" class="wb-select" onchange="applyProControls()">
                    <option value="none">Auto WB</option>
                    <option value="tungsten">Chụp Đêm Đô Thị (💡)</option>
                    <option value="daylight">Ấm Áp Cổ Kính (☀️)</option>
                </select>
                <span class="pro-val" style="width:40px;"></span>
            </div>
        </div>

        <div class="zoom-control-box">
            <span class="zoom-label" id="zoomValue">Zoom: 1.0x</span>
            <input type="range" min="10" max="40" value="10" class="zoom-slider" id="cameraZoomSlider" oninput="applyCameraZoom(this.value)">
        </div>

        <div id="layout-spiral" class="overlay-layer active"><svg class="spiral-svg" viewBox="0 0 1000 1000"><path d="M500,500 m -300, 0 a 300,300 0 1,0 600,0 a 300,300 0 1,0 -600,0" fill="none" stroke="rgba(0,255,255,0.3)" stroke-width="2"/></svg></div>
        <div id="layout-grid" class="overlay-layer"><div class="line grid-v1"></div><div class="line grid-v2"></div><div class="line grid-h1"></div><div class="line grid-h2"></div></div>

        <div class="controls-panel">
            <div class="mode-selector">
                <button class="mode-btn" onclick="changeLayout('spiral', this)">Tâm Điểm</button>
                <button class="mode-btn selected" onclick="changeLayout('grid', this)">Lưới 1/3</button>
                <button class="mode-btn pro-active-tab" id="proToggleBtn" onclick="toggleProMode()">Chế Độ (PRO)</button>
            </div>
            <div class="action-area">
                <div class="shutter-container">
                    <label for="fileUpload" class="upload-btn">📁</label>
                    <input type="file" id="fileUpload" accept="image/*" style="display: none;" onchange="uploadLocalImage(event)">
                    <span class="shutter-label">Nạp Ảnh</span>
                </div>
                
                <div class="shutter-container"><button class="shutter-btn night-active" onclick="takePhoto(false)"></button><span class="shutter-label" style="color: #ff9800;">Chụp Đêm</span></div>
                <div class="shutter-container"><button class="shutter-btn" style="background: #00ffff;" onclick="takePhoto(true)"></button><span class="shutter-label">Chụp Màu</span></div>
            </div>
        </div>
    </div>

    <div class="preview-container" id="previewView">
        <div class="status-header" style="color: #ff9800;">SOPCARE COLOR GRAPHIC PROCESSOR</div>
        
        <div class="preview-box">
            <div class="image-wrapper" id="previewImageWrapper">
                <img id="previewImage" alt="Preview">
                <div class="gradient-overlay" id="gradientOverlay"></div>
            </div>
        </div>

        <div class="zoom-control-box" style="position: relative; bottom: 0; width: 94%; background: #131318; border-color: #22222a; margin-bottom: 2px;">
            <span class="zoom-label" id="previewZoomValue" style="color: #ff00ff;">Cắt Bố Cục: 1.0x</span>
            <input type="range" min="10" max="40" value="10" class="zoom-slider" id="previewZoomSlider" oninput="applyPreviewZoom(this.value)" style="background: #252530;">
        </div>
        
        <div class="advanced-mixer-panel">
            <div class="mixer-selectors-row">
                <div class="filter-select-box">
                    <label>Lọc Màu (A)</label>
                    <select id="selectFilterA" class="styled-select" onchange="onSelectBoxChange()"></select>
                </div>
                <button class="night-enhance-btn" onclick="triggerAutoEnhance()">✨ Auto HDR Fix</button>
                <div class="filter-select-box">
                    <label>Phủ Màu (B)</label>
                    <select id="selectFilterB" class="styled-select" onchange="onSelectBoxChange()"></select>
                </div>
            </div>
            <div class="mixer-info">
                <span id="labelFilterA">Màu A</span>
                <span id="mixValue" style="color: #00ffff;">Tỉ lệ trộn: 0%</span>
                <span id="labelFilterB" style="color: #ff00ff;">Màu B</span>
            </div>
            <input type="range" min="0" max="100" value="0" class="mixer-slider" id="mixRange" oninput="updateMixRatio(this.value)">
        </div>

        <div class="filter-bar" id="filterBar"></div>
        <div class="bottom-actions"><button class="action-btn btn-cancel" onclick="cancelPreview()">Chụp Lại</button><button class="action-btn btn-download" onclick="downloadFinalImage()">Tải Ảnh Sắc Nét</button></div>
    </div>

    <div id="loadingToast" class="loading-toast">🚀 ĐANG KHỞI TẠO ĐIỂM ẢNH...</div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video'), canvas = document.getElementById('canvas'), cameraView = document.getElementById('cameraView'), previewView = document.getElementById('previewView'), previewImage = document.getElementById('previewImage'), previewImageWrapper = document.getElementById('previewImageWrapper'), gradientOverlay = document.getElementById('gradientOverlay'), filterBar = document.getElementById('filterBar'), loadingToast = document.getElementById('loadingToast'), mixRange = document.getElementById('mixRange'), mixValue = document.getElementById('mixValue'), cameraZoomSlider = document.getElementById('cameraZoomSlider'), zoomValue = document.getElementById('zoomValue'), previewZoomSlider = document.getElementById('previewZoomSlider'), previewZoomValue = document.getElementById('previewZoomValue'), selectFilterA = document.getElementById('selectFilterA'), selectFilterB = document.getElementById('selectFilterB'), labelFilterA = document.getElementById('labelFilterA'), labelFilterB = document.getElementById('labelFilterB');
        
        const proPanel = document.getElementById('proPanel'), proToggleBtn = document.getElementById('proToggleBtn'), proEV = document.getElementById('proEV'), proContrast = document.getElementById('proContrast'), proSat = document.getElementById('proSat'), proWB = document.getElementById('proWB');
        const valEV = document.getElementById('valEV'), valContrast = document.getElementById('valContrast'), valSat = document.getElementById('valSat');

        let currentStream = null, useFacingMode = "environment", originalImageDataUrl = '', isProModeActive = true;
        let selectedFilterId = 'normal', secondaryFilterId = 'tone-xam-den', currentMixRatio = 0;

        // BỘ CÔNG THỨC MÀU ĐƯỢC PHÁT TRIỂN DỰA TRÊN CÁC MẪU ẢNH CỦA BẠN
        const filtersConfig = [
            { id: 'normal', name: 'Màu Gốc', filterCSS: 'none', blend: 'none', grad: '', rawValues: { con:100, sat:100, bri:100, sep:0, hue:0 } },
            
            { id: 'tone-xam-den', name: '⚫ Xám Đen', 
              filterCSS: 'contrast(86%) brightness(79%) saturate(93%) sepia(5%) hue-rotate(10deg)', 
              blend: 'multiply', grad: 'rgba(30,30,35,0.08)', 
              rawValues: { con:86, sat:93, bri:79, sep:5, hue:10 } },

            { id: 'tone-nau-nhat', name: '☕ Nâu Nhạt', 
              filterCSS: 'contrast(80%) brightness(69%) saturate(74%) sepia(10%) hue-rotate(-25deg)', 
              blend: 'soft-light', grad: 'linear-gradient(to bottom, rgba(139,69,19,0.05), transparent)', 
              rawValues: { con:80, sat:74, bri:69, sep:10, hue:-25 } },
              
            { id: 'tone-trang-han', name: '🤍 Trắng Hàn', 
              filterCSS: 'contrast(78%) brightness(115%) saturate(76%) sepia(2%) hue-rotate(0deg)', 
              blend: 'overlay', grad: 'rgba(255,255,255,0.12)', 
              rawValues: { con:78, sat:76, bri:115, sep:2, hue:0 } },

            { id: 'tone-xam-trang', name: '🥈 Xám Trắng', 
              filterCSS: 'contrast(108%) brightness(108%) saturate(65%) sepia(4%) hue-rotate(0deg)', 
              blend: 'normal', grad: '', 
              rawValues: { con:108, sat:65, bri:108, sep:4, hue:0 } },

            { id: 'tone-tu-nhien', name: '🍃 Tự Nhiên', 
              filterCSS: 'contrast(82%) brightness(106%) saturate(82%) sepia(2%) hue-rotate(0deg)', 
              blend: 'none', grad: '', 
              rawValues: { con:82, sat:82, bri:106, sep:2, hue:0 } },

            { id: 'tone-mau-nang', name: '☀️ Màu Nắng', 
              filterCSS: 'contrast(60%) brightness(177%) saturate(95%) sepia(15%) hue-rotate(15deg)', 
              blend: 'soft-light', grad: 'linear-gradient(135deg, rgba(255,223,0,0.1), transparent)', 
              rawValues: { con:60, sat:95, bri:177, sep:15, hue:15 } },

            { id: 'tone-xanh-duong', name: '🔷 Xanh Dương', 
              filterCSS: 'contrast(62%) brightness(89%) saturate(140%) sepia(0%) hue-rotate(-50deg)', 
              blend: 'overlay', grad: 'linear-gradient(to top, rgba(0,0,255,0.08), transparent)', 
              rawValues: { con:62, sat:140, bri:89, sep:0, hue:-50 } },

            { id: 'tone-xanh-la', name: '🌲 Xanh Lá', 
              filterCSS: 'contrast(61%) brightness(132%) saturate(140%) sepia(5%) hue-rotate(25deg)', 
              blend: 'soft-light', grad: 'linear-gradient(to bottom, rgba(0,128,0,0.05), transparent)', 
              rawValues: { con:61, sat:140, bri:132, sep:5, hue:25 } },

            { id: 'tone-dem-cyber', name: '🌌 Đêm Đô Thị', 
              filterCSS: 'contrast(125%) saturate(135%) brightness(90%) sepia(2%) hue-rotate(-15deg)', 
              blend: 'overlay', grad: 'linear-gradient(to top, rgba(0, 50, 150, 0.12), transparent)', 
              rawValues: { con:125, sat:135, bri:90, sep:2, hue:-15 } }
        ];

        function toggleProMode() {
            isProModeActive = !isProModeActive;
            if(isProModeActive) { proPanel.classList.add('active'); proToggleBtn.classList.add('pro-active-tab'); } 
            else { proPanel.classList.remove('active'); proToggleBtn.classList.remove('pro-active-tab'); resetProControls(); }
        }

        function resetProControls() { proEV.value = -3; proContrast.value = 115; proSat.value = 110; proWB.value = "none"; applyProControls(); }

        function applyProControls() {
            const ev = parseInt(proEV.value) / 10; valEV.innerText = (ev >= 0 ? "+" : "") + ev.toFixed(1);
            const con = proContrast.value; valContrast.innerText = con + "%";
            const sat = proSat.value; valSat.innerText = sat + "%";
            const bri = 100 + (ev * 15);
            
            let wbFilter = "";
            if (proWB.value === "daylight") wbFilter = "sepia(8%) hue-rotate(5deg)";
            else if (proWB.value === "tungsten") wbFilter = "hue-rotate(-15deg) saturate(110%)";

            video.style.filter = `brightness(${bri}%) contrast(${con}%) saturate(${sat}%) ${wbFilter}`;
        }

        function applyCameraZoom(val) { video.style.transform = `scale(${val / 10})`; zoomValue.innerText = `Zoom: ${(val / 10).toFixed(1)}x`; }
        function applyPreviewZoom(val) { previewImage.style.transform = `scale(${val / 10})`; previewZoomValue.innerText = `Cắt Bố Cục: ${(val / 10).toFixed(1)}x`; }

        async function initCam() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            cameraZoomSlider.value = 10; applyCameraZoom(10);
            if(isProModeActive) { proPanel.classList.add('active'); applyProControls(); }
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: useFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
                video.srcObject = currentStream;
            } catch (err) { currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false }); video.srcObject = currentStream; }
        }
        
        function toggleCamera() { useFacingMode = (useFacingMode === "environment") ? "user" : "environment"; initCam(); }
        function changeLayout(l, b) { document.querySelectorAll('.overlay-layer').forEach(y => y.classList.remove('active')); document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('selected')); document.getElementById(`layout-${l}`).classList.add('active'); b.classList.add('selected'); }

        function buildSelectOptions() {
            selectFilterA.innerHTML = ''; selectFilterB.innerHTML = '';
            filtersConfig.forEach(f => {
                const optA = document.createElement('option'); optA.value = f.id; optA.textContent = f.name; selectFilterA.appendChild(optA);
                const optB = document.createElement('option'); optB.value = f.id; optB.textContent = f.name; selectFilterB.appendChild(optB);
            });
            selectFilterA.value = selectedFilterId; selectFilterB.value = secondaryFilterId;
        }
        function onSelectBoxChange() { selectedFilterId = selectFilterA.value; secondaryFilterId = selectFilterB.value; applyMixedFilters(); renderFilterBar(); }

        function renderFilterBar() {
            filterBar.innerHTML = '';
            filtersConfig.forEach(f => {
                const item = document.createElement('div');
                item.className = `filter-item ${f.id === selectedFilterId ? 'active' : ''}`;
                item.onclick = () => { selectedFilterId = f.id; selectFilterA.value = f.id; applyMixedFilters(); renderFilterBar(); };
                item.innerHTML = `<div class="filter-thumb" style="filter: ${f.filterCSS}; background:${f.grad?f.grad:'#444'}"></div><div class="filter-name">${f.name}</div>`;
                filterBar.appendChild(item);
            });
            labelFilterA.innerText = filtersConfig.find(f => f.id === selectedFilterId).name;
            labelFilterB.innerText = filtersConfig.find(f => f.id === secondaryFilterId).name;
        }

        function applyMixedFilters() {
            const filterA = filtersConfig.find(f => f.id === selectedFilterId);
            const filterB = filtersConfig.find(f => f.id === secondaryFilterId);
            const ratio = currentMixRatio / 100;
            
            const c = filterA.rawValues.con + (filterB.rawValues.con - filterA.rawValues.con) * ratio;
            const s = filterA.rawValues.sat + (filterB.rawValues.sat - filterA.rawValues.sat) * ratio;
            const b = filterA.rawValues.bri + (filterB.rawValues.bri - filterA.rawValues.bri) * ratio;
            const sep = filterA.rawValues.sep + (filterB.rawValues.sep - filterA.rawValues.sep) * ratio;
            const h = filterA.rawValues.hue + (filterB.rawValues.hue - filterA.rawValues.hue) * ratio;
            
            previewImage.style.filter = `contrast(${c}%) saturate(${s}%) brightness(${b}%) sepia(${sep}%) hue-rotate(${h}deg)`;
            gradientOverlay.style.background = ratio > 0.5 ? (filterB.grad || 'none') : (filterA.grad || 'none');
            gradientOverlay.style.mixBlendMode = ratio > 0.5 ? filterB.blend : filterA.blend;
        }

        function updateMixRatio(val) { currentMixRatio = parseInt(val); mixValue.innerText = `Tỉ lệ trộn: ${val}%`; applyMixedFilters(); }

        function triggerAutoEnhance() {
            // Tự động tối ưu hóa cân bằng vùng sáng tối nhẹ nhàng
            mixRange.value = 30; currentMixRatio = 30; mixValue.innerText = "Tỉ lệ trộn: 30%";
            applyMixedFilters();
        }

        function uploadLocalImage(event) {
            const file = event.target.files[0]; if (!file) return;
            loadingToast.innerText = "📁 NẠP ẢNH HẬU KỲ..."; loadingToast.style.display = 'block';
            const reader = new FileReader();
            reader.onload = function(e) {
                originalImageDataUrl = e.target.result; previewImage.src = originalImageDataUrl;
                mixRange.value = 0; currentMixRatio = 0; mixValue.innerText = "Tỉ lệ trộn: 0%";
                previewZoomSlider.value = 10; applyPreviewZoom(10);
                setTimeout(() => {
                    loadingToast.style.display = 'none'; cameraView.style.display = 'none'; previewView.style.display = 'flex';
                    selectedFilterId = 'normal'; secondaryFilterId = 'tone-xam-den';
                    selectFilterA.value = selectedFilterId; selectFilterB.value = secondaryFilterId;
                    applyMixedFilters(); renderFilterBar();
                }, 400);
            };
            reader.readAsDataURL(file);
        }

        function takePhoto(isNormalMode) {
            const ctx = canvas.getContext('2d'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const sf = cameraZoomSlider.value / 10; const sw = canvas.width / sf; const sh = canvas.height / sf;
            const sx = (canvas.width - sw) / 2; const sy = (canvas.height - sh) / 2;
            
            if (useFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            
            ctx.filter = video.style.filter;
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height); ctx.setTransform(1, 0, 0, 1, 0, 0);
            
            originalImageDataUrl = canvas.toDataURL('image/png'); previewImage.src = originalImageDataUrl;
            previewZoomSlider.value = 10; applyPreviewZoom(10);

            cameraView.style.display = 'none'; previewView.style.display = 'flex';
            
            if(!isNormalMode) {
                // Nếu bấm nút Chụp Đêm -> Ưu tiên áp Tone Đêm Đô Thị ngay
                selectedFilterId = 'tone-dem-cyber'; secondaryFilterId = 'tone-xam-den';
                mixRange.value = 20; currentMixRatio = 20; mixValue.innerText = "Tỉ lệ trộn: 20%";
            } else {
                selectedFilterId = 'normal'; secondaryFilterId = 'tone-xam-den';
                mixRange.value = 0; currentMixRatio = 0; mixValue.innerText = "Tỉ lệ trộn: 0%";
            }
            selectFilterA.value = selectedFilterId; selectFilterB.value = secondaryFilterId;
            applyMixedFilters(); renderFilterBar();
        }

        function cancelPreview() { previewView.style.display = 'none'; cameraView.style.display = 'flex'; document.getElementById('fileUpload').value = ''; initCam(); }

        function downloadFinalImage() {
            loadingToast.innerText = "👽 ĐANG XUẤT FILE ẢNH CHUYÊN NGHIỆP..."; loadingToast.style.display = 'block';
            const img = new Image(); img.src = originalImageDataUrl;
            img.onload = function() {
                const ctx = canvas.getContext('2d'); 
                const pSf = previewZoomSlider.value / 10;
                canvas.width = img.width; canvas.height = img.height;
                
                const cropW = img.width / pSf; const cropH = img.height / pSf;
                const cropX = (img.width - cropW) / 2; const cropY = (img.height - cropH) / 2;
                
                ctx.filter = previewImage.style.filter; 
                ctx.drawImage(img, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);
                
                const activeOver = currentMixRatio / 100 > 0.5 ? filtersConfig.find(f=>f.id===secondaryFilterId) : filtersConfig.find(f=>f.id===selectedFilterId);
                if(activeOver.grad && activeOver.grad !== 'none') {
                    ctx.globalCompositeOperation = activeOver.blend;
                    if(activeOver.id==='tone-dem-cyber') {
                        let g = ctx.createLinearGradient(0, canvas.height, 0, 0);
                        g.addColorStop(0, "rgba(0, 50, 150, 0.12)"); g.addColorStop(1, "transparent");
                        ctx.fillStyle = g;
                    } else if(activeOver.id==='tone-mau-nang') {
                        let g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                        g.addColorStop(0, "rgba(255,223,0,0.1)"); g.addColorStop(1, "transparent");
                        ctx.fillStyle = g;
                    } else if(activeOver.id==='tone-xanh-duong') {
                        let g = ctx.createLinearGradient(0, canvas.height, 0, 0);
                        g.addColorStop(0, "rgba(0,0,255,0.08)"); g.addColorStop(1, "transparent");
                        ctx.fillStyle = g;
                    } else {
                        ctx.fillStyle = activeOver.grad;
                    }
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                ctx.globalCompositeOperation = 'source-over'; ctx.filter = "none";
                
                canvas.toBlob(function(b) {
                    const u = URL.createObjectURL(b); const l = document.createElement('a'); l.href = u; l.download = `Sopcare_Cam_${new Date().getTime()}.png`;
                    document.body.appendChild(l); l.click();
                    setTimeout(() => { document.body.removeChild(l); URL.revokeObjectURL(u); loadingToast.style.display = 'none'; }, 500);
                }, 'image/png', 1.0);
            };
        }
        window.addEventListener('DOMContentLoaded', () => { buildSelectOptions(); initCam(); renderFilterBar(); });
    </script>
</body>
</html>
